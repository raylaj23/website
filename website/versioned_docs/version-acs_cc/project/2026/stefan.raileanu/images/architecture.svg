<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="1120" height="760" viewBox="0 0 1120 760" style="background:#ffffff;background-color:light-dark(#ffffff,#121212);color-scheme:light dark;font-family:'Times New Roman',serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" style="fill:light-dark(#000,#fff);"/>
    </marker>
    <style><![CDATA[
      .ext { fill: #ffffff; stroke: #000000; stroke-width: 1.2; }
      .mod { fill: #f4f4f4; stroke: #000000; stroke-width: 1.2; }
      .mcu { fill: none; stroke: #000000; stroke-width: 2; stroke-dasharray: 7 5; }
      .label  { font-size: 13px; text-anchor: middle; fill: #000; }
      .sub    { font-size: 11px; text-anchor: middle; fill: #000; }
      .title  { font-size: 14px; font-weight: bold; text-anchor: middle; fill: #000; }
      .mcu-title { font-size: 16px; font-weight: bold; text-anchor: middle; fill: #000; }
      .doc-title { font-size: 17px; font-weight: bold; text-anchor: middle; fill: #000; }
      .edge { stroke: #000; stroke-width: 1.3; fill: none; }
      .edge-int { stroke: #000; stroke-width: 1.3; fill: none; stroke-dasharray: 5 4; }
      .edge-label { font-size: 11px; fill: #000; text-anchor: middle; }
      @media (prefers-color-scheme: dark) {
        .ext { fill: #1e1e1e; stroke: #ffffff; }
        .mod { fill: #2a2a2a; stroke: #ffffff; }
        .mcu { stroke: #ffffff; }
        .label, .sub, .title, .mcu-title, .doc-title, .edge-label { fill: #fff; }
        .edge, .edge-int { stroke: #fff; }
      }
    ]]></style>
  </defs>

  <!-- Diagram title -->
  <text class="doc-title" x="560" y="34">DJ Controller — Architecture</text>

  <!-- ============== External: SD Card (top) ============== -->
  <rect class="ext" x="470" y="80" width="180" height="56" rx="8"/>
  <text class="title" x="560" y="106">SD Card</text>
  <text class="sub"   x="560" y="124">WAV files</text>

  <!-- ============== STM32U5 outer box ============== -->
  <rect class="mcu" x="210" y="190" width="740" height="280" rx="14"/>
  <text class="mcu-title" x="280" y="214" text-anchor="start">STM32U5</text>

  <!-- Internal modules -->
  <rect class="mod" x="245" y="250" width="190" height="180" rx="10"/>
  <text class="title" x="340" y="338">Input Handler</text>
  <text class="sub"   x="340" y="358">User controls</text>

  <rect class="mod" x="485" y="250" width="190" height="180" rx="10"/>
  <text class="title" x="580" y="332">Audio Engine</text>
  <text class="sub"   x="580" y="352">DSP · Mixing · Playback</text>
  <text class="sub"   x="580" y="372">(Internal DAC out)</text>

  <rect class="mod" x="725" y="250" width="190" height="180" rx="10"/>
  <text class="title" x="820" y="338">Display Driver</text>
  <text class="sub"   x="820" y="358">Per-deck UI</text>

  <!-- Internal arrows between modules -->
  <path class="edge-int" d="M 435 340 L 485 340" marker-end="url(#arrow)"/>

  <path class="edge-int" d="M 675 340 L 725 340" marker-end="url(#arrow)"/>

  <!-- UI nav events: curved arc above modules, inside STM32 box -->
  <path class="edge-int" d="M 340 250 Q 580 232 820 250" marker-end="url(#arrow)"/>

  <!-- ============== External arrows: SD Card -> Audio Engine ============== -->
  <path class="edge" d="M 580 136 L 580 250" marker-end="url(#arrow)"/>
  <text class="edge-label" x="602" y="158">SPI</text>

  <!-- ============== External: Input devices (left) ============== -->
  <rect class="ext" x="40" y="260" width="170" height="50" rx="8"/>
  <text class="title" x="125" y="284">Rotary Encoders</text>
  <text class="sub"   x="125" y="300">2× jog wheels</text>

  <rect class="ext" x="40" y="335" width="170" height="50" rx="8"/>
  <text class="title" x="125" y="360">Potentiometers</text>
  <text class="sub"   x="125" y="376">EQ · Filters · Vol · XF</text>

  <rect class="ext" x="40" y="410" width="170" height="50" rx="8"/>
  <text class="title" x="125" y="434">Push Buttons</text>
  <text class="sub"   x="125" y="450">Play · Cue · Loop · Sync</text>

  <!-- Arrows: external inputs -> Input Handler -->
  <path class="edge" d="M 210 285 L 245 290" marker-end="url(#arrow)"/>
  <text class="edge-label" x="227" y="278">GPIO</text>

  <path class="edge" d="M 210 360 L 245 350" marker-end="url(#arrow)"/>
  <text class="edge-label" x="227" y="345">ADC</text>

  <path class="edge" d="M 210 435 L 245 405" marker-end="url(#arrow)"/>
  <text class="edge-label" x="227" y="423">GPIO</text>

  <!-- ============== External: Displays (right) ============== -->
  <rect class="ext" x="960" y="305" width="140" height="70" rx="8"/>
  <text class="title" x="1030" y="334">2× ILI9341</text>
  <text class="sub"   x="1030" y="352">TFT Displays</text>

  <path class="edge" d="M 915 340 L 960 340" marker-end="url(#arrow)"/>
  <text class="edge-label" x="937" y="332">SPI</text>

  <!-- ============== Audio output chain (bottom) ============== -->
  <!-- Main mix: STM32 internal DAC -> 3.5mm AUX -> Marshall Middleton -->
  <path class="edge" d="M 555 430 L 290 590" marker-end="url(#arrow)"/>
  <text class="edge-label" x="395" y="498">3.5mm AUX</text>
  <text class="edge-label" x="395" y="512">(internal DAC)</text>

  <!-- Cue: STM32 internal DAC -> TPA6132 -->
  <path class="edge" d="M 605 430 L 870 590" marker-end="url(#arrow)"/>
  <text class="edge-label" x="770" y="498">cue out</text>
  <text class="edge-label" x="770" y="512">(internal DAC)</text>

  <!-- Marshall Middleton speaker (built-in amp + speakers) -->
  <rect class="ext" x="200" y="590" width="180" height="70" rx="8"/>
  <text class="title" x="290" y="615">Marshall Middleton</text>
  <text class="sub"   x="290" y="635">Built-in 50W Amp</text>
  <text class="sub"   x="290" y="651">+ AUX input</text>

  <!-- TPA6132 Headphone Amp -->
  <rect class="ext" x="780" y="590" width="180" height="70" rx="8"/>
  <text class="title" x="870" y="615">TPA6132 Amp</text>
  <text class="sub"   x="870" y="635">Headphone driver</text>

  <!-- Final output -->
  <rect class="ext" x="200" y="700" width="180" height="28" rx="6"/>
  <text class="label" x="290" y="719">Speakers</text>
  <path class="edge" d="M 290 660 L 290 700" marker-end="url(#arrow)"/>

  <rect class="ext" x="780" y="700" width="180" height="28" rx="6"/>
  <text class="label" x="870" y="719">Headphones</text>
  <path class="edge" d="M 870 660 L 870 700" marker-end="url(#arrow)"/>
</svg>
