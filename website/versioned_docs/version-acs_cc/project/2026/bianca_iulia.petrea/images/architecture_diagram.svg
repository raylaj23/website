<svg viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="13">

  <!-- White background -->
  <rect width="820" height="560" fill="white"/>

  <!-- Title -->
  <text x="30" y="45" font-size="26" font-weight="bold" fill="#111">Architecture</text>

  <!-- ─────────────────────────────────────── -->
  <!-- BOXES -->
  <!-- ─────────────────────────────────────── -->

  <!-- MPU6050 IMU (top center) -->
  <rect x="290" y="70" width="150" height="60" fill="white" stroke="#222" stroke-width="1.5" rx="4"/>
  <text x="365" y="97" text-anchor="middle" fill="#111">MPU-6050</text>
  <text x="365" y="115" text-anchor="middle" fill="#111" font-size="11">(IMU Sensor)</text>

  <!-- STM32 Nucleo (center) -->
  <rect x="270" y="230" width="190" height="75" fill="white" stroke="#222" stroke-width="1.5" rx="4"/>
  <text x="365" y="262" text-anchor="middle" fill="#111">STM32 Nucleo Board</text>
  <text x="365" y="280" text-anchor="middle" fill="#111" font-size="11">(Processing Unit)</text>
  <text x="365" y="296" text-anchor="middle" fill="#111" font-size="10">Nucleo-U545RE-Q</text>

  <!-- Servo X (top right) -->
  <rect x="590" y="90" width="140" height="55" fill="white" stroke="#222" stroke-width="1.5" rx="4"/>
  <text x="660" y="116" text-anchor="middle" fill="#111">SG90 Servo X</text>
  <text x="660" y="134" text-anchor="middle" fill="#111" font-size="11">(Tilt axis X)</text>

  <!-- Servo Y (mid right) -->
  <rect x="590" y="185" width="140" height="55" fill="white" stroke="#222" stroke-width="1.5" rx="4"/>
  <text x="660" y="211" text-anchor="middle" fill="#111">SG90 Servo Y</text>
  <text x="660" y="229" text-anchor="middle" fill="#111" font-size="11">(Tilt axis Y)</text>

  <!-- SD Card (right) -->
  <rect x="590" y="290" width="140" height="55" fill="white" stroke="#222" stroke-width="1.5" rx="4"/>
  <text x="660" y="312" text-anchor="middle" fill="#111">MicroSD Module</text>
  <text x="660" y="330" text-anchor="middle" fill="#111" font-size="11">(High Score log)</text>

  <!-- IR Sensor (bottom center) -->
  <rect x="290" y="410" width="150" height="55" fill="white" stroke="#222" stroke-width="1.5" rx="4"/>
  <text x="365" y="432" text-anchor="middle" fill="#111">IR Obstacle Sensor</text>
  <text x="365" y="450" text-anchor="middle" fill="#111" font-size="11">(Finish line detect)</text>

  <!-- Power Supply 5V (bottom left) -->
  <rect x="70" y="410" width="150" height="55" fill="white" stroke="#222" stroke-width="1.5" rx="4"/>
  <text x="145" y="432" text-anchor="middle" fill="#111">Power Supply (5V)</text>
  <text x="145" y="450" text-anchor="middle" fill="#111" font-size="11">6×AA + MB102</text>

  <!-- USB / PC (top left) -->
  <rect x="70" y="230" width="140" height="55" fill="white" stroke="#222" stroke-width="1.5" rx="4"/>
  <text x="140" y="252" text-anchor="middle" fill="#111">USB-C / PC</text>
  <text x="140" y="270" text-anchor="middle" fill="#111" font-size="11">(Flash + Debug)</text>
  <text x="140" y="284" text-anchor="middle" fill="#111" font-size="10">ST-LINK/V3</text>

  <!-- ─────────────────────────────────────── -->
  <!-- ARROWS -->
  <!-- ─────────────────────────────────────── -->

  <!-- MPU6050 → Nucleo (I2C, down) -->
  <line x1="365" y1="130" x2="365" y2="228" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="372" y="185" font-size="10" fill="#444" transform="rotate(0)">I2C</text>

  <!-- Nucleo → Servo X (PWM, top-right diagonal) -->
  <line x1="460" y1="248" x2="588" y2="135" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="513" y="185" font-size="10" fill="#444" transform="rotate(-32,513,185)">PWM</text>

  <!-- Nucleo → Servo Y (PWM, right) -->
  <line x1="460" y1="258" x2="588" y2="220" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="505" y="233" font-size="10" fill="#444">PWM</text>

  <!-- Nucleo → SD Card (SPI, bottom-right diagonal) -->
  <line x1="460" y1="270" x2="588" y2="310" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="505" y="300" font-size="10" fill="#444">SPI</text>

  <!-- IR Sensor → Nucleo (GPIO, up) -->
  <line x1="365" y1="410" x2="365" y2="307" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="372" y="365" font-size="10" fill="#444">GPIO</text>

  <!-- Power Supply → Nucleo (up-right) -->
  <line x1="220" y1="415" x2="285" y2="305" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="218" y="358" font-size="10" fill="#444">5V</text>

  <!-- Power Supply → Servo X + Y (right-up, power rail) -->
  <polyline points="220,412 220,118 588,118" stroke="#222" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="235" y="108" font-size="10" fill="#444">5V (servo power)</text>

  <!-- USB → Nucleo (right) -->
  <line x1="210" y1="257" x2="268" y2="257" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="220" y="250" font-size="10" fill="#444">USB</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M1,1 L1,7 L8,4 z" fill="#222"/>
    </marker>
  </defs>

</svg>
