<svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" style="background:white;font-family:Arial,sans-serif">
  <title>Rust-Grow greenhouse automation block diagram</title>
  <desc>STM32 Nucleo-64 central controller with all sensors, OLED display, fan+heater pair and thermistor overheat protection.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text font-size="16" font-weight="500" fill="#1a1a1a" x="340" y="26" text-anchor="middle">Rust-Grow</text>

  <!-- Central controller (purple) -->
  <g>
    <rect x="255" y="270" width="170" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#3C3489" x="340" y="292" text-anchor="middle" dominant-baseline="central">STM32 Nucleo-64</text>
    <text font-size="12" fill="#534AB7" x="340" y="310" text-anchor="middle" dominant-baseline="central">Central controller (Rust)</text>
  </g>

  <!-- OLED display (blue) -->
  <g>
    <rect x="255" y="45" width="170" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#0C447C" x="340" y="67" text-anchor="middle" dominant-baseline="central">OLED display</text>
    <text font-size="12" fill="#185FA5" x="340" y="85" text-anchor="middle" dominant-baseline="central">Temp, humidity, CO2, pH</text>
  </g>
  <line x1="340" y1="270" x2="340" y2="101" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Buzzer (coral) -->
  <g>
    <rect x="44" y="90" width="130" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#712B13" x="109" y="108" text-anchor="middle" dominant-baseline="central">Buzzer</text>
    <text font-size="12" fill="#993C1D" x="109" y="126" text-anchor="middle" dominant-baseline="central">Low water alert</text>
  </g>

  <!-- Green LED (coral) -->
  <g>
    <rect x="44" y="170" width="130" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#712B13" x="109" y="188" text-anchor="middle" dominant-baseline="central">Green LED</text>
    <text font-size="12" fill="#993C1D" x="109" y="206" text-anchor="middle" dominant-baseline="central">Normal operation</text>
  </g>

  <!-- Yellow LED (coral) -->
  <g>
    <rect x="44" y="260" width="130" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#712B13" x="109" y="278" text-anchor="middle" dominant-baseline="central">Yellow LED</text>
    <text font-size="12" fill="#993C1D" x="109" y="296" text-anchor="middle" dominant-baseline="central">Temp/humidity warning</text>
  </g>

  <!-- Red LED (coral) -->
  <g>
    <rect x="44" y="340" width="130" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#712B13" x="109" y="358" text-anchor="middle" dominant-baseline="central">Red LED</text>
    <text font-size="12" fill="#993C1D" x="109" y="376" text-anchor="middle" dominant-baseline="central">Critical error</text>
  </g>

  <!-- Heating unit dashed container -->
  <rect x="36" y="425" width="146" height="118" rx="10" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="5 3"/>
  <text font-size="12" fill="#555" x="109" y="420" text-anchor="middle">Heating unit</text>

  <!-- Fan (amber) -->
  <g>
    <rect x="48" y="432" width="122" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#633806" x="109" y="450" text-anchor="middle" dominant-baseline="central">Fan</text>
    <text font-size="12" fill="#854F0B" x="109" y="468" text-anchor="middle" dominant-baseline="central">Circulates air</text>
  </g>

  <!-- Heater (amber) -->
  <g>
    <rect x="48" y="486" width="122" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#633806" x="109" y="504" text-anchor="middle" dominant-baseline="central">Heater element</text>
    <text font-size="12" fill="#854F0B" x="109" y="522" text-anchor="middle" dominant-baseline="central">Warms cold air</text>
  </g>

  <!-- Arrows: controller -> left outputs -->
  <path d="M255 280 L196 280 L196 112 L174 112" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M255 282 L196 282 L196 192 L174 192" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="255" y1="288" x2="174" y2="282" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M255 294 L196 294 L196 362 L174 362" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M255 300 L196 300 L196 454 L170 454" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M255 302 L196 302 L196 508 L170 508" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- DHT22 / SHT31 (teal) -->
  <g>
    <rect x="466" y="45" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="551" y="67" text-anchor="middle" dominant-baseline="central">DHT22 / SHT31</text>
    <text font-size="12" fill="#0F6E56" x="551" y="85" text-anchor="middle" dominant-baseline="central">Air temp &amp; humidity</text>
  </g>

  <!-- MH-Z19B (teal) -->
  <g>
    <rect x="466" y="123" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="551" y="145" text-anchor="middle" dominant-baseline="central">MH-Z19B</text>
    <text font-size="12" fill="#0F6E56" x="551" y="163" text-anchor="middle" dominant-baseline="central">CO2 sensor (UART)</text>
  </g>

  <!-- Thermistor (red) -->
  <g>
    <rect x="466" y="201" width="170" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#791F1F" x="551" y="223" text-anchor="middle" dominant-baseline="central">Thermistor</text>
    <text font-size="12" fill="#A32D2D" x="551" y="241" text-anchor="middle" dominant-baseline="central">Overheat protection</text>
  </g>

  <!-- Soil moisture (teal) -->
  <g>
    <rect x="466" y="279" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="551" y="301" text-anchor="middle" dominant-baseline="central">Soil moisture sensor</text>
    <text font-size="12" fill="#0F6E56" x="551" y="319" text-anchor="middle" dominant-baseline="central">Capacitive, analog</text>
  </g>

  <!-- DS18B20 (teal) -->
  <g>
    <rect x="466" y="357" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="551" y="379" text-anchor="middle" dominant-baseline="central">DS18B20</text>
    <text font-size="12" fill="#0F6E56" x="551" y="397" text-anchor="middle" dominant-baseline="central">Soil temp (1-Wire)</text>
  </g>

  <!-- Soil pH (teal) -->
  <g>
    <rect x="466" y="435" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="551" y="457" text-anchor="middle" dominant-baseline="central">Soil pH sensor</text>
    <text font-size="12" fill="#0F6E56" x="551" y="475" text-anchor="middle" dominant-baseline="central">Analog output</text>
  </g>

  <!-- HC-SR04 (teal) -->
  <g>
    <rect x="466" y="513" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="551" y="535" text-anchor="middle" dominant-baseline="central">HC-SR04</text>
    <text font-size="12" fill="#0F6E56" x="551" y="553" text-anchor="middle" dominant-baseline="central">Water level (ultrasonic)</text>
  </g>

  <!-- DS3231 RTC (teal) -->
  <g>
    <rect x="255" y="475" width="170" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="340" y="497" text-anchor="middle" dominant-baseline="central">DS3231 RTC</text>
    <text font-size="12" fill="#0F6E56" x="340" y="515" text-anchor="middle" dominant-baseline="central">Day/night scheduling (I2C)</text>
  </g>

  <!-- 5V Power supply (gray) -->
  <g>
    <rect x="255" y="575" width="170" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#444441" x="340" y="593" text-anchor="middle" dominant-baseline="central">5V power supply</text>
    <text font-size="12" fill="#5F5E5A" x="340" y="611" text-anchor="middle" dominant-baseline="central">Powers all modules</text>
  </g>

  <!-- Arrows: sensors -> controller bus at x=432 -->
  <path d="M466 73 L432 73 L432 288" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M466 151 L432 151 L432 288" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M466 229 L432 229 L432 288" fill="none" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M466 307 L432 307 L432 298" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M466 385 L432 385 L432 298" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M466 463 L432 463 L432 298" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M466 541 L432 541 L432 298" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="432" y1="293" x2="425" y2="293" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- RTC -> controller -->
  <line x1="340" y1="475" x2="340" y2="326" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Power -> RTC -->
  <line x1="340" y1="575" x2="340" y2="531" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <line x1="44" y1="628" x2="70" y2="628" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#555" x="76" y="632">Data / control</text>
  <line x1="168" y1="628" x2="194" y2="628" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#555" x="200" y="632">Safety feedback</text>
  <rect x="308" y="622" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="12" fill="#555" x="322" y="632">Sensors</text>
  <rect x="382" y="622" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" fill="#555" x="396" y="632">Alerts</text>
  <rect x="442" y="622" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="12" fill="#555" x="456" y="632">Actuators</text>
  <rect x="522" y="622" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="12" fill="#555" x="536" y="632">Display</text>
</svg>
