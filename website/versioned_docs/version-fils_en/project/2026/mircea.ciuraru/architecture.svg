<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
    <marker id="arrow-power" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="10"/>

  <rect x="20" y="40" width="260" height="480" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="150" y="70" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#0f172a">WIFI Wand</text>
  <text x="150" y="90" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#64748b">(Battery Powered)</text>

  <rect x="50" y="120" width="200" height="40" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2" />
  <text x="150" y="145" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#991b1b">Li-Po Battery (ex. 90mAh)</text>

  <rect x="50" y="190" width="200" height="40" rx="6" fill="#fef08a" stroke="#fde047" stroke-width="2" />
  <text x="150" y="215" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#854d0e">TP4056 (Type-C Charger)</text>

  <rect x="50" y="280" width="200" height="60" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="150" y="305" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e3a8a">ESP32-S3 SuperMini</text>
  <text x="150" y="325" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1e3a8a">(DSP &amp; RF Broadcaster)</text>

  <rect x="60" y="410" width="180" height="50" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2" />
  <text x="150" y="440" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0369a1">MPU6050 Sensor</text>

  <line x1="150" y1="160" x2="150" y2="190" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3" /> <line x1="150" y1="230" x2="150" y2="280" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-power)" /> <text x="160" y="260" font-family="sans-serif" font-size="11" font-weight="bold" fill="#ef4444">3.3V Power</text>

  <line x1="150" y1="410" x2="150" y2="340" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" /> <text x="160" y="380" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569">I2C (Data)</text>


  <path d="M 280 310 C 330 260, 370 360, 420 310" fill="transparent" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="350" y="280" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#7c3aed">ESP-NOW</text>
  <text x="350" y="295" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#7c3aed">(~10ms RF Link)</text>


  <rect x="420" y="40" width="300" height="480" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="570" y="70" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#0f172a">WIFI Controller</text>
  <text x="570" y="90" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#64748b">(Base Station)</text>

  <rect x="470" y="120" width="200" height="40" rx="6" fill="#fef08a" stroke="#fde047" stroke-width="2" />
  <text x="570" y="145" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#854d0e">TP4056 (Type-C Power/Charge)</text>

  <rect x="470" y="200" width="200" height="50" rx="6" fill="#dcfce7" stroke="#4ade80" stroke-width="2" />
  <text x="570" y="230" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#14532d">ESP8266 Bridge</text>

  <rect x="450" y="300" width="240" height="60" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="2" />
  <text x="570" y="325" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#14532d">STM32U545RE-Q</text>
  <text x="570" y="345" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#14532d">(Main Routing Logic)</text>

  <rect x="500" y="420" width="140" height="40" rx="6" fill="#334155" stroke="#0f172a" stroke-width="2" />
  <text x="570" y="445" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#f8fafc">0.96" OLED UI</text>

  <line x1="570" y1="160" x2="570" y2="300" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-power)" /> <text x="580" y="185" font-family="sans-serif" font-size="11" font-weight="bold" fill="#ef4444">5V/3.3V Pwr</text>

  <line x1="570" y1="250" x2="570" y2="300" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)" />
  <text x="580" y="280" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569">UART</text>

  <line x1="570" y1="360" x2="570" y2="420" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" />
  <text x="580" y="395" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569">I2C</text>


  <path d="M 720 225 C 760 225, 800 225, 830 225" fill="transparent" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="775" y="210" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#b45309">802.11 Wi-Fi</text>
  <text x="775" y="245" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#b45309">(ubus HTTP API)</text>


  <rect x="830" y="165" width="160" height="120" rx="10" fill="#fffbeb" stroke="#fde047" stroke-width="2" />
  <text x="910" y="205" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#78350f">OpenWRT</text>
  <text x="910" y="225" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#78350f">(Target Router)</text>

  <rect x="840" y="245" width="140" height="25" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1" />
  <text x="910" y="262" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#92400e">Action Executed</text>

</svg>
